version: "3.9"

services:
  backend-a:
    build:
      context: ./BackendA/BackendA
    container_name: backend-a
    ports:
      - "5001:8080"

  backend-b:
    build:
      context: ./BackendB/BackendB
    container_name: backend-b
    ports:
      - "5002:8080"

  proxy:
    build:
      context: ./ApiGateway/ApiGateway
    container_name: yarp-proxy
    depends_on:
      - backend-a
      - backend-b
    ports:
      - "5000:8080"